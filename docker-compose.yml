services:

  # ─── Ollama (GPU) ─────────────────────────────────────────────────────────
  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_MODEL=${OLLAMA_MODEL}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ─── Goose CLI ──────────────────────────────────────────────────────────────
  goose:
    build: .
    container_name: goose
    restart: unless-stopped
    depends_on:
      - ollama
    network_mode: host
    volumes:
      - goose_data:/root/.config/goose
      - ./goose.yaml:/goose.yaml:ro
    environment:
      - GOOSE_PROVIDER=ollama
      - GOOSE_MODEL=${OLLAMA_MODEL}
      - OLLAMA_HOST=http://localhost:11434
      - GOOSE_TELEMETRY_ENABLED=false
      - GOOSE_INPUT_LIMIT=${GOOSE_INPUT_LIMIT:-4096}
    command: gateway start --bot-token ${TELEGRAM_BOT_TOKEN} telegram
    stdin_open: true
    tty: true

volumes:
  goose_data:
  ollama_data:
